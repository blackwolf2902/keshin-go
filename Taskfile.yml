version: "3"

tasks:
  dev:
    desc: Start all development services
    cmds:
      - task: dev:go
      - task: dev:ai

  dev:go:
    desc: Start Go server
    cmds:
      - go run ./cmd/keshin run --mode web --port 8080

  dev:ai:
    desc: Start Python AI service
    dir: ai
    cmds:
      - uv run uvicorn keshin_ai.main:app --reload --port 9090

  dev:frontend:
    desc: Start frontend dev server
    dir: frontend
    cmds:
      - bun run dev

  build:
    desc: Build all
    cmds:
      - task: build:go
      - task: build:frontend

  build:go:
    desc: Build Go binary
    cmds:
      - go build -o bin/keshin ./cmd/keshin

  build:frontend:
    desc: Build frontend
    dir: frontend
    cmds:
      - bun run build

  lint:
    desc: Check all code for lint errors
    cmds:
      - task: lint:go
      - task: lint:ai
      - task: lint:frontend
      - task: lint:tsc

  lint:go:
    desc: Check Go code with go vet
    cmds:
      - go vet ./...

  lint:ai:
    desc: Check Python code with ruff
    dir: ai
    cmds:
      - uv run ruff check .

  lint:frontend:
    desc: Check frontend code with eslint
    dir: frontend
    cmds:
      - npx eslint src/

  lint:tsc:
    desc: TypeScript type check (no emit)
    dir: frontend
    cmds:
      - bun run tsc --noEmit

  lint:fix:
    desc: Auto-fix all lint issues
    cmds:
      - task: lint:fix:go
      - task: lint:fix:ai
      - task: lint:fix:frontend

  lint:fix:go:
    desc: Auto-fix Go (go fmt + go vet)
    cmds:
      - go fmt ./...
      - go vet ./...

  lint:fix:ai:
    desc: Auto-fix Python with ruff
    dir: ai
    cmds:
      - uv run ruff check . --fix

  lint:fix:frontend:
    desc: Auto-fix frontend with eslint
    dir: frontend
    cmds:
      - npx eslint src/ --fix

  test:
    desc: Run all tests
    cmds:
      - go test ./...
      - task: test:ai

  test:ai:
    desc: Run Python tests
    dir: ai
    cmds:
      - uv run pytest

  docker:voicevox:
    desc: Start VOICEVOX container (optional)
    cmds:
      - docker compose up -d voicevox

  docker:kokoro:
    desc: Start Kokoro container (optional)
    cmds:
      - docker compose up -d kokoro

  setup:
    desc: One-command dev setup
    cmds:
      - task: setup:go
      - task: setup:ai
      - task: setup:frontend

  setup:go:
    cmds:
      - go mod download

  setup:ai:
    dir: ai
    cmds:
      - uv sync

  setup:frontend:
    dir: frontend
    cmds:
      - bun install
